<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow">
    <title>Language Redirect</title>
    <script>
        (function() {
            try {
                var lang = (navigator.language || navigator.browserLanguage || navigator.userLanguage || 'en').toLowerCase();
                var target = '/en/';
                if (lang.indexOf('zh') === 0) target = '/zh/';
                if (lang.indexOf('vi') === 0) target = '/vi/';
                if (lang.indexOf('ja') === 0) target = '/ja/';
                if (lang.indexOf('ko') === 0) target = '/ko/';
                if (lang.indexOf('hi') === 0) target = '/hi/';
                if (lang.indexOf('es') === 0) target = '/es/';
                if (lang.indexOf('fr') === 0) target = '/fr/';
                if (lang.indexOf('ar') === 0) target = '/ar/';
                if (lang.indexOf('bn') === 0) target = '/bn/';
                if (lang.indexOf('pt') === 0) target = '/pt/';
                if (lang.indexOf('ru') === 0) target = '/ru/';
                if (lang.indexOf('ur') === 0) target = '/ur/';
                if (lang.indexOf('id') === 0) target = '/id/';
                if (lang.indexOf('de') === 0) target = '/de/';
                if (lang.indexOf('pcm') === 0) target = '/pcm/';
                if (lang.indexOf('en-ng') === 0) target = '/pcm/';
                if (lang.indexOf('mr') === 0) target = '/mr/';
                if (lang.indexOf('te') === 0) target = '/te/';
                if (lang.indexOf('tr') === 0) target = '/tr/';
                if (lang.indexOf('ta') === 0) target = '/ta/';
                window.location.replace(target);
            } catch (e) {
                window.location.replace('/en/');
            }
        })();
    </script>
</head>
<body>
    <p><a href="/en/">Continue to StarryRing</a></p>
</body>
</html>
