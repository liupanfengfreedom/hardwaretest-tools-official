    </ol>
  </nav>
  <div class="language-switcher">
    <button class="language-trigger" id="languageTrigger" aria-label="选择语言" aria-expanded="false"><i class="fas fa-globe"></i></button>
    <div class="language-dropdown" id="languageDropdown">
      <a class="language-option selected" href="/zh/utility-tools/netdev/json-parser/" data-lang="zh">中文版</a>
      <a class="language-option" href="/en/utility-tools/netdev/json-parser/" data-lang="en">English</a>
    </div>

<div class="json-parser-app">
<header>
  <div class="logo">
    <div class="logo-icon">{}</div>
    JSON <span>Parser</span>
  </div>
  <div class="header-btns">
    <button class="btn" onclick="loadSample()">示例</button>
    <button class="btn ghost" onclick="clearAll()">清空</button>
    <button class="btn primary" onclick="parseJSON()">▶ 解析</button>
  </div>
</header>

<div class="main">

  <!-- Left -->
  <div class="left">
    <div class="pnl-hdr">
      <span class="pnl-title">输入 JSON</span>
      <div class="actions">
        <span style="font-size:10px;color:var(--text3)">Ctrl+Enter 解析</span>
      </div>
    </div>
    <textarea id="inp" placeholder='粘贴 JSON 数据，例如：
{
  "name": "Claude",
  "version": 3,
  "active": true
}' oninput="onInp()" spellcheck="false"></textarea>
    <div class="statusbar">
      <div class="dot" id="sdot"></div>
      <span id="stxt">等待输入</span>
      <span style="margin-left:auto" id="schar">0 字符</span>
      <span id="sline">0 行</span>
    </div>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="tabs">
      <div class="tab active" data-tab="tree" onclick="switchTab(this)">树形视图</div>
      <div class="tab" data-tab="fmt"  onclick="switchTab(this)">格式化</div>
      <div class="tab" data-tab="cmp"  onclick="switchTab(this)">压缩</div>
      <div class="tab" data-tab="stat" onclick="switchTab(this)">统计</div>
    </div>

    <!-- Tree -->
    <div class="tab-pane active" id="pane-tree">
      <div class="tree-toolbar">
        <input class="search-in" id="srch" placeholder="搜索 key 或 value…" oninput="doSearch()">
        <span class="search-cnt" id="scnt"></span>
        <button class="btn" onclick="expandAll()">展开</button>
        <button class="btn" onclick="collapseAll()">折叠</button>
      </div>
      <div class="tree-scroll">
        <div class="error-box" id="errbox"><strong>❌ 解析错误</strong><span id="errmsg"></span></div>
        <div class="json-tree" id="tree">
          <div class="empty"><div class="empty-ico">{ }</div>输入 JSON 并点击解析</div>
        </div>
      </div>
    </div>

    <!-- Format -->
    <div class="tab-pane" id="pane-fmt">
      <div class="code-toolbar">
        <span class="pnl-title">格式化</span>
        <div class="actions">
          缩进：<select id="ind" onchange="parseJSON()">
            <option value="2">2 空格</option>
            <option value="4">4 空格</option>
            <option value="tab">Tab</option>
          </select>
          <button class="btn" onclick="copy('fmt')">复制</button>
        </div>
      </div>
      <pre class="code-out" id="out-fmt"><div class="empty"><div class="empty-ico">{ }</div>解析后显示</div></pre>
    </div>

    <!-- Compact -->
    <div class="tab-pane" id="pane-cmp">
      <div class="code-toolbar">
        <span class="pnl-title">压缩</span>
        <button class="btn" onclick="copy('cmp')">复制</button>
      </div>
      <pre class="code-out" id="out-cmp" style="white-space:pre-wrap;word-break:break-all"><div class="empty"><div class="empty-ico">{ }</div>解析后显示</div></pre>
    </div>

    <!-- Stats -->
    <div class="tab-pane" id="pane-stat">
      <div class="stats-grid" id="sgrid">
        <div style="grid-column:1/-1"><div class="empty" style="height:200px"><div class="empty-ico">{ }</div>解析后显示统计</div></div>
      </div>
    </div>

    <div class="pathbar">
      <span class="root">$</span>
      <span id="pathout">根节点</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ 已复制</div>
</div>
