<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full">
        <div class="glass p-10 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">保持联系 🛰️</h2>
            <p class="text-slate-400 mb-8">遇到了 Bug？或者想聊聊游戏开发？随时欢迎。</p>

            <div class="space-y-4">
                <!-- 官方邮箱 -->
                <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-xl hover:bg-slate-800 transition-all cursor-pointer group">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center text-blue-400">
                            📧
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-widest">官方邮箱</p>
                            <p class="font-mono">support@starryring.com</p>
                        </div>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-xs bg-slate-700 px-3 py-1 rounded text-slate-300">复制</button>
                </div>

                <!-- GitHub -->
                <a href="https://github.com/liupanfengfreedom/hardwaretest-tools-official" class="flex items-center justify-between p-4 bg-slate-800/50 rounded-xl hover:bg-slate-800 transition-all group">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center text-white">
                            🐙
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-widest">Github</p>
                            <p class="font-mono">starry-ring-dev</p>
                        </div>
                    </div>
                    <span class="text-slate-600">→</span>
                </a>

                <!-- Discord 链接 -->
                <a href="https://discord.gg/GastfUgC" class="flex items-center justify-between p-4 bg-slate-800/50 rounded-xl hover:bg-slate-800 transition-all group">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center text-purple-400 text-xl">
                            💬
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-widest">Discord</p>
                            <p class="font-mono text-sm sm:text-base">https://discord.gg/GastfUgC</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="hidden sm:block p-1 bg-white rounded-lg opacity-80 group-hover:opacity-100 transition-opacity">
                            <img src="/static/image/zh/contact-discord.png" alt="Discord QR" class="w-20 h-20 object-cover rounded-lg">
                        </div>
                        <span class="text-slate-600 group-hover:translate-x-1 transition-transform">→</span>
                    </div>
                </a>
            </div>

            <footer class="mt-12 pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">
                目前由我一个人维护，回复可能会稍有延迟，感谢理解。
                <div class="mt-4 pt-4 border-t border-slate-700 space-x-3">
                    <a href="/zh/about-us" class="text-blue-400 hover:text-blue-300 transition-colors">关于我们</a>               
                    <a href="/zh/disclaimer" class="text-blue-400 hover:text-blue-300 transition-colors">免责声明</a>
                    <a href="/zh/privacy" class="text-blue-400 hover:text-blue-300 transition-colors">隐私政策</a>
                    <a href="/zh/terms" class="text-blue-400 hover:text-blue-300 transition-colors">使用条款</a>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
